<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WMS-AE Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">WMS-AE Master Dashboard</h1>
        
        <div class="bg-white p-6 rounded shadow mb-6">
            <input id="supabaseUrl" type="text" placeholder="Project URL" class="border p-2 w-full mb-2">
            <input id="supabaseKey" type="password" placeholder="Anon Key" class="border p-2 w-full mb-2">
            
            <select id="tableSelect" class="border p-2 w-full mb-2">
                <option value="Issuance_Log">Issuance_Log</option>
                <option value="Monthly_Inventory">Monthly_Inventory</option>
                <option value="MRR_Lines">MRR_Lines</option>
                <option value="MRR_List">MRR_List</option>
                <option value="Manpower">Manpower</option>
                <option value="PERSIS">PERSIS</option>
                <option value="PO_Lines">PO_Lines</option>
                <option value="Product_List">Product_List</option>
                <option value="Receiving_Log">Receiving_Log</option>
                <option value="Stock_Change">Stock_Change</option>
                <option value="Trip_Ticket">Trip_Ticket</option>
                <option value="UM">UM</option>
            </select>
            
            <button onclick="loadTable()" class="bg-blue-600 text-white px-4 py-2 rounded">Load Selected Table</button>
        </div>

        <div class="overflow-x-auto bg-white p-4 shadow">
            <table class="w-full border text-sm text-left">
                <thead id="tableHead" class="bg-gray-200"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadTable() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            const table = document.getElementById('tableSelect').value;

            const client = supabase.createClient(url, key);
            
            // Dito namin ginagamit ang exact table name na may underscore
            const { data, error } = await client.from(table).select('*').limit(50);

            if (error) {
                alert("Error: " + error.message);
                console.error(error);
                return;
            }

            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            
            if (data.length > 0) {
                head.innerHTML = `<tr>${Object.keys(data[0]).map(k => `<th class="p-2 border">${k}</th>`).join('')}</tr>`;
                body.innerHTML = data.map(row => `<tr>${Object.values(row).map(v => `<td class="p-2 border">${v ?? ''}</td>`).join('')}</tr>`).join('');
            }
        }
    </script>
</body>
</html>
