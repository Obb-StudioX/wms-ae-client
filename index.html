<script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.0/dist/index.min.js"></script>

<div class="bg-white p-6 rounded-xl shadow-md mt-6">
    <h2 class="text-lg font-bold mb-2">AI Inventory Assistant</h2>
    <input id="aiKey" type="password" placeholder="Enter Google AI API Key" class="border p-2 w-full mb-2">
    <textarea id="aiPrompt" class="w-full border p-2 mb-2" placeholder="Tanungin ang AI tungkol sa data... hal: 'Alin ang may pinakamababang stock?'"></textarea>
    <button onclick="askAI()" class="bg-purple-600 text-white px-4 py-2 rounded">Ask AI</button>
    <div id="aiResponse" class="mt-4 p-4 bg-gray-50 border rounded hidden"></div>
</div>

<script>
    async function askAI() {
        const apiKey = document.getElementById('aiKey').value;
        const prompt = document.getElementById('aiPrompt').value;
        const tableData = document.getElementById('tableBody').innerText; // Kinukuha ang data sa screen
        
        const genAI = new GoogleGenerativeAI(apiKey);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const result = await model.generateContent(`Base sa data na ito: ${tableData}. Sagutin ang tanong: ${prompt}`);
        const response = await result.response;
        
        const outputDiv = document.getElementById('aiResponse');
        outputDiv.innerText = response.text();
        outputDiv.classList.remove('hidden');
    }
</script>
