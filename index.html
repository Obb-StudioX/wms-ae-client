<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS-AE Smart Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Warehouse Inventory Dashboard</h1>

        <div class="bg-white p-4 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-2">Connect to Supabase</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="supabaseUrl" type="text" placeholder="Supabase Project URL" class="border p-2 rounded w-full">
                <input id="supabaseKey" type="password" placeholder="Supabase Anon Key" class="border p-2 rounded w-full">
            </div>
            <button onclick="initSupabase()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Connect & Load Data</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b">
                        <th class="p-3">Item Code</th>
                        <th class="p-3">Item Name</th>
                        <th class="p-3">Quantity</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let supabaseClient;

        async function initSupabase() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                alert('Please enter your Supabase URL and Key');
                return;
            }

            try {
                supabaseClient = supabase.createClient(url, key);
                const { data, error } = await supabaseClient
                    .from('inventory')
                    .select('*');

                if (error) throw error;

                const tbody = document.getElementById('inventoryBody');
                tbody.innerHTML = '';
                
                data.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3">${item.item_code}</td>
                            <td class="p-3">${item.item_name}</td>
                            <td class="p-3 font-bold">${item.quantity}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                alert('Error: ' + err.message);
                console.error(err);
            }
        }
    </script>
</body>
</html>
