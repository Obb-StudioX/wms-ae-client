<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WMS-AE AI Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.3/dist/index.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">WMS-AE AI Master Dashboard</h1>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="supabaseUrl" placeholder="Supabase URL" class="border p-2 rounded">
            <input id="supabaseKey" placeholder="Supabase Anon Key" class="border p-2 rounded">
            <input id="aiKey" placeholder="Gemini API Key" class="border p-2 rounded col-span-2">
            
            <select id="tableSelect" class="border p-2 rounded">
                <option value="Issuance_Log">Issuance Log</option>
                <option value="Monthly_Inventory">Monthly Inventory</option>
                <option value="MRR_Lines">MRR Lines</option>
                <option value="Product_List">Product List</option>
            </select>
            <button onclick="analyzeData()" class="bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700">Load & AI Analyze</button>
        </div>

        <div id="aiBox" class="bg-indigo-900 text-white p-6 rounded-xl shadow-lg mb-6 hidden">
            <h2 class="font-bold text-lg mb-2 text-indigo-300">AI Inventory Insights</h2>
            <div id="aiOutput">Naghahanap ng insights...</div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead id="tableHead" class="bg-gray-100 uppercase"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function analyzeData() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            const aiKey = document.getElementById('aiKey').value.trim();
            const table = document.getElementById('tableSelect').value;

            if (!aiKey) { alert("Pakilagay ang Gemini API Key"); return; }

            // 1. Fetch data from Supabase
            const client = supabase.createClient(url, key);
            const { data, error } = await client.from(table).select('*').limit(20);
            
            if (error) { alert("Supabase Error: " + error.message); return; }

            // 2. Render Table
            const body = document.getElementById('tableBody');
            body.innerHTML = data.map(row => `<tr>${Object.values(row).map(v => `<td class="p-2 border">${v ?? ''}</td>`).join('')}</tr>`).join('');

            // 3. AI Analysis
            document.getElementById('aiBox').classList.remove('hidden');
            document.getElementById('aiOutput').innerText = "Nag-aanalyze ang AI...";

            const genAI = new GoogleGenerativeAI(aiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const prompt = `Ito ang data mula sa ${table} ng warehouse ko: ${JSON.stringify(data)}. 
            Magbigay ka ng 3 mahalagang observations o babala (e.g., kulang na stock, kakaibang pattern). 
            Maging direkta at professional.`;
            
            const result = await model.generateContent(prompt);
            document.getElementById('aiOutput').innerText = result.response.text();
        }
    </script>
</body>
</html>
