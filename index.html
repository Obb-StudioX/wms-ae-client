<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WMS-AE AI Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">WMS-AE AI Master Dashboard</h1>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="supabaseUrl" placeholder="Supabase URL" class="border p-2 rounded">
            <input id="supabaseKey" placeholder="Supabase Anon Key" class="border p-2 rounded">
            <input id="aiKey" placeholder="Gemini API Key" class="border p-2 rounded col-span-2">
            
            <select id="tableSelect" class="border p-2 rounded">
                <option value="Issuance_Log">Issuance_Log</option>
                <option value="Monthly_Inventory">Monthly_Inventory</option>
                <option value="MRR_Lines">MRR_Lines</option>
            </select>
            <button id="analyzeBtn" class="bg-indigo-600 text-white font-bold py-2 rounded">Load & AI Analyze</button>
        </div>

        <div id="aiBox" class="bg-indigo-900 text-white p-6 rounded-xl shadow-lg mb-6">
            <h2 class="font-bold text-lg mb-2 text-indigo-300">AI Inventory Insights</h2>
            <div id="aiOutput">I-click ang button para simulan ang pagsusuri...</div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto">
            <table class="w-full text-sm text-left">
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        window.analyzeData = async function() {
            const output = document.getElementById('aiOutput');
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            const aiKey = document.getElementById('aiKey').value.trim();
            const table = document.getElementById('tableSelect').value;

            if (!url || !key || !aiKey) { alert("Kumpletuhin ang mga inputs!"); return; }

            output.innerText = "Kumokonekta...";

            try {
                // 1. Supabase Fetch
                const client = supabase.createClient(url, key);
                const { data, error } = await client.from(table).select('*').limit(20);
                if (error) throw error;

                document.getElementById('tableBody').innerHTML = data.map(row => 
                    `<tr>${Object.values(row).map(v => `<td class="p-2 border">${v ?? ''}</td>`).join('')}</tr>`
                ).join('');

                // 2. AI Analysis gamit ang imported module
                output.innerText = "Naghahanda ng AI insights...";
                const genAI = new GoogleGenerativeAI(aiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                const prompt = `Data mula sa ${table}: ${JSON.stringify(data)}. Magbigay ng 3 maikling insights.`;
                const result = await model.generateContent(prompt);
                
                output.innerText = result.response.text();
            } catch (err) {
                console.error(err);
                output.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
